<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Limited Offer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="overlay">
    <div class="container">

      <h1>😱 Aap yaqeen nahi karoge!</h1>

      <!-- Offer Image -->
      <img src="images/offer.png" class="main-img" alt="Offer">

      <p>Yeh sirf limited logon ke liye hai...</p>

      <div id="countdown" class="timer"></div>

      <a href="https://yourlink.com" class="btn">👉 CLICK HERE</a>

    </div>
  </div>

  <script>
    let time = 300;

    setInterval(() => {
      let m = Math.floor(time / 60);
      let s = time % 60;

      document.getElementById("countdown").innerHTML =
        "⏳ Time Left: " + m + ":" + (s < 10 ? "0" : "") + s;

      if (time > 0) time--;
    }, 1000);
  </script>

</body>
</html>
