<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Limited Offer</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #000, #1a1a1a);
      color: white;
      text-align: center;
    }

    .container {
      padding: 50px 20px;
    }

    h1 {
      color: #ffcc00;
      font-size: 32px;
    }

    p {
      font-size: 18px;
      margin: 20px 0;
    }

    .btn {
      display: inline-block;
      padding: 15px 30px;
      font-size: 20px;
      color: white;
      background: red;
      border-radius: 8px;
      text-decoration: none;
      margin-top: 20px;
      box-shadow: 0 0 15px red;
      transition: 0.3s;
    }

    .btn:hover {
      background: #ff0000;
      transform: scale(1.05);
    }

    .timer {
      margin-top: 20px;
      font-size: 22px;
      color: #00ffcc;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>😱 Aap yaqeen nahi karoge!</h1>
    
    <p>Yeh offer sirf limited time ke liye hai...</p>

    <div class="timer" id="countdown">Loading...</div>

    <a href="https://yourlink.com" class="btn">👉 CLICK HERE</a>
  </div>

  <script>
    // 5 minute countdown timer
    let time = 300;

    setInterval(() => {
      let minutes = Math.floor(time / 60);
      let seconds = time % 60;

      document.getElementById("countdown").innerHTML =
        "⏳ Time Left: " + minutes + ":" + (seconds < 10 ? "0" : "") + seconds;

      if (time > 0) time--;
    }, 1000);
  </script>

</body>
</html>
